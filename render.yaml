# Render Blueprint — deploys the FunGame FastAPI backend as a Docker web service.
# 1. Push this repo to GitHub (already done).
# 2. On render.com: New + > Blueprint > pick this repo. Render reads this file.
# 3. Fill in MONGO_URL (from MongoDB Atlas) and JWT_SECRET when prompted.
services:
  - type: web
    name: fungame-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false          # set in dashboard — MongoDB Atlas connection string
      - key: DB_NAME
        value: fungame
      - key: JWT_SECRET
        sync: false          # set in dashboard — long random string
      - key: CORS_ORIGINS
        value: "*"
      - key: APP_ENV
        value: development
      - key: EMAIL_PROVIDER
        value: demo

  # Static frontend (CDN-served, always on). Built by Render; serves the PWA
  # that PWABuilder wraps into the Android APK.
  - type: web
    name: fungame-web
    runtime: static
    rootDir: frontend
    buildCommand: yarn install --network-timeout 600000 && yarn build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://fungame-api.onrender.com
      - key: GENERATE_SOURCEMAP
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
